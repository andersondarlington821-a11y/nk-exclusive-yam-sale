<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NK'S - EXCLUSIVE YAM SALE</title> 
  <link rel="icon" type="image/svg" href="nk">
    <style>
    body {
      font-family: Arial, sans-serif;
      background-color: rgb(255, 228, 196);
      margin: 0;
      padding: 0;
    }

    header {
      background-color: rgb(107, 55, 55); /* Yam brown color */
      color: white;
      padding: 15px 0;
      text-align: center;
    }

    h1 {
      margin: 0;
    }

    .container {
      max-width: 60%;
      margin: 40px auto;
      padding: 20px;
      background-color:rgb(255, 228, 196);
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      background-color:  rgb(107, 55, 55);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: rgb(107, 55, 55);
    }
    button:disabled { background-color: #aaa; cursor: not-allowed; }

    .output { margin-top: 20px; padding: 15px; border-radius: 5px; }
    .success { background-color: #d4edda; border-left: 5px solid #28a745; color: #155724; }
    .error   { background-color: #f8d7da; border-left: 5px solid #dc3545; color: #721c24; }
    .loading { background-color: #fff3cd; border-left: 5px solid #ffc107; color: #856404; }


    /* Success overlay that covers the whole screen */
.success-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 999;
  justify-content: center;
  align-items: center;
}

/* The popup card */
.success-card {
  background: white;
  border-radius: 16px;
  padding: 40px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: popIn 0.4s ease;
}

@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

.success-icon {
  font-size: 5rem;
  margin-bottom: 10px;
}

.success-card h2 {
  color: #2D6A4F;
  margin-bottom: 10px;
  font-size: 1.6rem;
}

.success-card p {
  color: #555;
  margin: 6px 0;
  font-size: 0.95rem;
}

.order-details {
  background: #f9f9f9;
  border-radius: 10px;
  padding: 16px;
  margin: 20px 0;
  text-align: left;
}

.order-details p {
  margin: 8px 0;
  font-size: 0.9rem;
}

.order-details strong {
  color: #8B5E3C;
}

.close-btn {
  background-color: #8B5E3C;
  color: white;
  border: none;
  padding: 12px 30px;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 10px;
  width: auto;
}

  .close-btn:hover { background-color: #6B4423; }
  </style>
</head>
<body>

  <header>
    <h1>NK'S EXCLUSIVE YAM SALE</h1>
  </header>

  <div class="container">
    <p>Fill in the details below to place your yam order.</p>

    <form id="yamOrderForm">
      <label for="name">Full Name:</label>
      <input type="text" id="name" placeholder="Enter your full name" required>

      <label for="address">Delivery Address:</label>
      <input type="text" id="address" placeholder="Enter delivery address" required>

      <label for="yamType">Select Yam Type:</label>
      <select id="yamType" required>
        <option value="">-- Select a yam type --</option>
        <option value="White Yam">White Yam  </option>
        <option value="Yellow Yam">Yellow Yam </option>
        <option value="Water Yam">Water Yam  </option>
      </select>

      <label for="amount">Amount:</label>
      <input type="number" id="amount" placeholder="Enter amount " min="1" required>

      <label for="price">Price </label>
      <select id="price" required>
        <option value="">----Select the price</option>
        <option value="1000">1000</option>
        <option value="1500">1500 </option>
        <option value="2000">2000</option>
        <option value="2500">2500</option>
        <option value="3000">3000</option>
      </select>

      <button type="submit" id="submitBtn">Place Order</button>
    </form>

    <div id="orderOutput" style="display:none;"></div>
  </div>

  <script>
    // ============================================================

    // ============================================================
    // CONFIGURATION
    // Point this to your Node.js server address.
    // While testing on your own computer, keep it as localhost:3000.
    // If you deploy online later, replace with your live server URL.
    // ============================================================
   
  const API_URL   = "http://localhost:3000";
  const form      = document.getElementById('yamOrderForm');
  const submitBtn = document.getElementById('submitBtn');

  // ---- Function to close popup ----
  function closePopup() {
    document.getElementById('successOverlay').style.display = 'none';
  }

  // ---- Handle form submission ----
  form.addEventListener('submit', async function(event) {
    event.preventDefault();

    const name    = document.getElementById('name').value.trim();
    const address = document.getElementById('address').value.trim();
    const yamType = document.getElementById('yamType').value;
    const amount  = document.getElementById('amount').value;
    const price   = document.getElementById('price').value;

    submitBtn.disabled    = true;
    submitBtn.textContent = 'Placing Order...';

    try {
      const response = await fetch(`${API_URL}/order`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name,
          address,
          yamType,
          amount: parseFloat(amount),
          price:  parseFloat(price)
        })
      });

      const result = await response.json();

      if (result.success) {
        // Fill the popup with order details
        const o = result.order;
      if (result.success) {
        const o = result.order;

        // Pack order details into URL and redirect to success page
        const query = new URLSearchParams({
          id:         o.id,
          name:       o.name,
          address:    o.address,
          yamType:    o.yamType,
          amount:     o.amount_kg,
          pricePerKg: o.pricePerKg.toLocaleString(),
          total:      o.totalPrice.toLocaleString()
        });

        form.reset();
        window.location.href = "success.html?" + query.toString();
      }

      } else {
        alert('❌ Error: ' + result.error);
      }

    } catch (err) {
      alert('❌ Could not connect to server. Make sure node server.js is running.');
    }

    submitBtn.disabled    = false;
    submitBtn.textContent = 'Place Order';
  });
  </script>
  </div>
</div>
</body>
</html>
